# 文件: .github/workflows/keepalive.yml
# 更新日期: 2026-05-28
# 用途: 定时访问 Streamlit Cloud demo，防止免费版因 7 天无访问自动休眠
# 主要改动:
#   - 2026-05-16: 初始版本，每 3 天 UTC 02:00 触发
#   - 2026-05-28 v2: cron 改为每天 UTC 02:00（北京 10:00），timeout 8→12 分钟
#   - 2026-05-28 v3: 加 upload-artifact 步骤，失败时把脚本 dump 的 HTML + 截图挂到 run 页面
#                    （always() 兜底，便于即便脚本异常退出也能拿到现场）

name: Keep Streamlit demo alive

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright + Chromium
        run: |
          pip install --quiet playwright
          playwright install --with-deps chromium

      - name: Visit demo (wake if sleeping)
        run: python .github/scripts/keepalive.py
        env:
          DEMO_URL: https://amazon-rank-demo-elita.streamlit.app/

      - name: Upload failure artifacts (HTML + screenshot)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-debug
          path: |
            keepalive_page.html
            keepalive_failure.png
          if-no-files-found: ignore
          retention-days: 7
